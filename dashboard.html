<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GCEE Civil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: var(--primary-dark); }
        .nav-link { color: rgba(255,255,255,0.8); border-radius: 5px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar p-3 text-white" style="width: 250px;">
            <div class="text-center mb-4 pt-3 border-bottom border-secondary pb-3">
                <i class="fa-solid fa-user-shield fs-1 text-accent mb-2"></i>
                <h5 class="fw-bold m-0 font-playfair">GCEE Admin</h5>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="#" id="nav-notices" onclick="switchTab('notices')"><i class="fa-solid fa-bullhorn me-2"></i> Manage Notices</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="nav-events" onclick="switchTab('events')"><i class="fa-solid fa-calendar-days me-2"></i> Manage Events</a>
                </li>
            </ul>
            <div class="mt-auto pt-5">
                <button class="btn btn-outline-light w-100" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h2 class="fw-bold text-primary-dark m-0 pb-1" id="page-title">Manage Notices</h2>
                <a href="index.html" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-eye me-1"></i> View Site</a>
            </div>

            <!-- Toast Notification -->
            <div class="position-fixed top-0 end-0 p-3" style="z-index: 11">
                <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body" id="toastMessage">Updates saved successfully!</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            </div>

            <!-- Notices Section -->
            <div id="notices-section">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold text-primary-dark">Add New Notice</h5>
                    </div>
                    <div class="card-body">
                        <form id="addNoticeForm">
                            <div class="row g-3">
                                <div class="col-md-9">
                                    <input type="text" class="form-control" id="noticeText" placeholder="Enter notice content description..." required>
                                </div>
                                <div class="col-md-3">
                                    <input type="date" class="form-control" id="noticeDate" required>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i> Add Notice</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="ps-4">No.</th>
                                        <th scope="col">Content</th>
                                        <th scope="col">Date</th>
                                        <th scope="col" class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="noticesTableBody">
                                    <!-- Populated via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Events Section -->
            <div id="events-section" class="d-none">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold text-primary-dark">Add New Event</h5>
                    </div>
                    <div class="card-body">
                        <form id="addEventForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="eventTitle" placeholder="Event Title (e.g., Tech Symposium 2024)" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="date" class="form-control" id="eventDate" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="time" class="form-control" id="eventTime">
                                </div>
                                <div class="col-md-12">
                                    <input type="text" class="form-control" id="eventLocation" placeholder="Location (e.g., Main Auditorium)">
                                </div>
                                <div class="col-md-12">
                                    <textarea class="form-control" id="eventDesc" rows="2" placeholder="Brief event description..."></textarea>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-accent border-0"><i class="fa-solid fa-plus me-1"></i> Add Event</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="ps-4">Title</th>
                                        <th scope="col">Date & Time</th>
                                        <th scope="col">Location</th>
                                        <th scope="col" class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="eventsTableBody">
                                    <!-- Populated via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check Authentication
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin.html';
        }

        let siteData = { notices: [], events: [] };

        // Fetch Initial Data
        async function fetchData() {
            try {
                const res = await fetch('http://localhost:8000/api/data');
                siteData = await res.json();
                renderNotices();
                renderEvents();
            } catch (err) {
                console.error("Failed to load data:", err);
            }
        }
        
        fetchData();

        // Save Data to Server
        async function saveData() {
            try {
                const res = await fetch('http://localhost:8000/api/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(siteData)
                });
                
                if (res.status === 401 || res.status === 403) {
                    alert("Session expired. Please log in again.");
                    logout();
                    return;
                }
                
                if (res.ok) {
                    showToast('Updates saved successfully!');
                } else {
                    showToast('Failed to save updates.', false);
                }
            } catch (err) {
                console.error(err);
                showToast('Error connecting to server.', false);
            }
        }

        // Generate Random ID
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // UI Tabs & Toast
        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            
            document.getElementById('notices-section').classList.add('d-none');
            document.getElementById('events-section').classList.add('d-none');
            
            document.getElementById(`${tab}-section`).classList.remove('d-none');
            
            document.getElementById('page-title').innerText = tab === 'notices' ? 'Manage Notices' : 'Manage Events';
        }

        function showToast(message, success = true) {
            const toastEl = document.getElementById('liveToast');
            document.getElementById('toastMessage').innerText = message;
            toastEl.className = `toast align-items-center text-white bg-${success ? 'success' : 'danger'} border-0`;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin.html';
        }

        /* --- NOTICES LOGIC --- */
        function renderNotices() {
            const tbody = document.getElementById('noticesTableBody');
            tbody.innerHTML = '';
            
            if (!siteData.notices || siteData.notices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No notices found. Add one above.</td></tr>';
                return;
            }
            
            // Sort by date newest first
            const sorted = [...siteData.notices].sort((a,b) => new Date(b.date) - new Date(a.date));
            
            sorted.forEach((n, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4 fw-bold text-muted">${index + 1}</td>
                    <td>${n.text}</td>
                    <td><span class="badge bg-light text-dark border"><i class="fa-regular fa-calendar me-1"></i> ${new Date(n.date).toLocaleDateString()}</span></td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteNotice('${n.id}')"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('addNoticeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const text = document.getElementById('noticeText').value;
            const date = document.getElementById('noticeDate').value;
            
            siteData.notices.push({ id: generateId(), text, date });
            saveData().then(() => {
                document.getElementById('addNoticeForm').reset();
                renderNotices();
            });
        });

        function deleteNotice(id) {
            if(confirm("Are you sure you want to delete this notice?")) {
                siteData.notices = siteData.notices.filter(n => n.id !== id);
                saveData().then(() => renderNotices());
            }
        }

        /* --- EVENTS LOGIC --- */
        function renderEvents() {
            const tbody = document.getElementById('eventsTableBody');
            tbody.innerHTML = '';
            
            if (!siteData.events || siteData.events.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No events found. Add one above.</td></tr>';
                return;
            }
            
            // Sort by date newest first
            const sorted = [...siteData.events].sort((a,b) => new Date(b.date) - new Date(a.date));
            
            sorted.forEach(evt => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4">
                        <h6 class="mb-0 fw-bold text-primary-dark">${evt.title}</h6>
                        <small class="text-muted d-block text-truncate" style="max-width: 250px;">${evt.desc || ''}</small>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border mb-1 d-inline-block"><i class="fa-regular fa-calendar me-1"></i> ${new Date(evt.date).toLocaleDateString()}</span><br>
                        ${evt.time ? `<span class="badge bg-light text-muted border border-dashed"><i class="fa-regular fa-clock me-1"></i> ${evt.time}</span>` : ''}
                    </td>
                    <td>${evt.location ? `<i class="fa-solid fa-location-dot text-danger me-1 small"></i> ${evt.location}` : '-'}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteEvent('${evt.id}')"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('addEventForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newEvent = {
                id: generateId(),
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                location: document.getElementById('eventLocation').value,
                desc: document.getElementById('eventDesc').value
            };
            
            siteData.events.push(newEvent);
            saveData().then(() => {
                document.getElementById('addEventForm').reset();
                renderEvents();
            });
        });

        function deleteEvent(id) {
            if(confirm("Are you sure you want to delete this event?")) {
                siteData.events = siteData.events.filter(e => e.id !== id);
                saveData().then(() => renderEvents());
            }
        }
    </script>
</body>
</html>
