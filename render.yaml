services:
  - type: web
    name: civil-dept-site
    env: python
    # Since you are using standard libraries, we just echo a message.
    # If you add external libraries later, change this to: pip install -r requirements.txt
    buildCommand: echo "No external dependencies to install"
    startCommand: python server.py
    disk:
      name: civil-data
      mountPath: /var/lib/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_FILE
        value: /var/lib/data/data.json
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: AUTH_TOKEN
        generateValue: true