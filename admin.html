<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GCEE Civil</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-primary-dark text-white text-center py-4 border-0">
                        <i class="fa-solid fa-user-shield fs-1 mb-2 text-accent"></i>
                        <h4 class="fw-bold mb-0 font-playfair">Admin Panel</h4>
                        <p class="small text-white-50 mb-0">Department Notice Board & Events</p>
                    </div>
                    <div class="card-body p-4 p-md-5 bg-white">
                        <div id="loginError" class="alert alert-danger d-none small py-2" role="alert">
                            Invalid credentials. Please try again.
                        </div>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="username" class="form-label small fw-bold text-muted text-uppercase letter-spacing-1">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                                    <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold text-muted text-uppercase letter-spacing-1">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm rounded-3 mt-2" id="loginBtn">
                                Login Access <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                            </button>
                        </form>
                    </div>
                    <div class="card-footer bg-light border-0 py-3 text-center">
                        <a href="index.html" class="text-muted small text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Back to Main Website</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Authenticating...';
            btn.disabled = true;
            error.classList.add('d-none');
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    error.classList.remove('d-none');
                    btn.innerHTML = 'Login Access <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                error.textContent = "Cannot connect to server.";
                error.classList.remove('d-none');
                btn.innerHTML = 'Login Access <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>';
                btn.disabled = false;
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
